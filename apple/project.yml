name: BinarizeApp
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    iOS: '16.0'
    macOS: '13.0'

settings:
  base:
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: FK7MJ2TMAX

schemes:
  BinarizeApp:
    build:
      targets:
        BinarizeApp-iOS: all
        BinarizeApp-macOS: all
    run:
      config: Debug
  BinarizeApp-iOS:
    build:
      targets:
        BinarizeApp-iOS: all
    run:
      config: Debug

targets:
  BinarizeApp-iOS:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: Shared/Assets.xcassets
      - path: Shared/LaunchScreen.storyboard
      - path: ../www
        buildPhase: resources
    resources:
      - path: Shared/Assets.xcassets
      - path: Shared/LaunchScreen.storyboard
      - path: ../www
    info:
      path: Info-iOS.plist
      properties:
        CFBundleDisplayName: "Binarize"
        NSPhotoLibraryUsageDescription: "画像読み込みのために写真ライブラリを使用します。"
        NSCameraUsageDescription: "撮影した画像を読み込むためにカメラを使用します。"

  BinarizeApp-macOS:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: Shared/Assets.xcassets
      - path: ../www
        buildPhase: resources
    resources:
      - path: Shared/Assets.xcassets
      - path: ../www
    info:
      path: Info-macOS.plist
      properties:
        CFBundleDisplayName: "Binarize"
