<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフライン</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1115;
      color: #f4f4f4;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, sans-serif;
    }
    main {
      width: min(92vw, 420px);
      padding: 24px;
      border: 1px solid #2f3440;
      border-radius: 18px;
      background: #171b22;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
    }
    p {
      margin: 0;
      color: #c1c7d0;
    }
  </style>
</head>
<body>
  <main>
    <h1>オフラインです</h1>
    <p>一度オンラインで開いてキャッシュされたあとなら、そのまま使えます。接続を戻してから再度開いてください。</p>
  </main>
</body>
</html>
